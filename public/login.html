<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Lead Finder Login</title>
    <link rel="stylesheet" href="/styles.css?v=20260509c" />
  </head>
  <body class="login-page opportunities-page public-site-page">
    <main class="login-shell">
      <section class="login-panel">
        <div>
          <p class="eyebrow">Local Lead Finder</p>
          <h1>Login or sign up</h1>
          <p class="login-note">
            Use your Google account to access lead discovery and website audits.
          </p>
        </div>
        <a class="google-login-button" href="/api/auth/google">
          <span>G</span>
          Continue with Google
        </a>
        <p id="loginError" class="form-error" role="alert"></p>
      </section>
    </main>
    <script src="/login.js?v=20260509c"></script>
  </body>
</html>
