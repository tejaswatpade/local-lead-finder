<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Internal Dashboard Login</title>
    <link rel="stylesheet" href="/styles.css?v=20260509c" />
  </head>
  <body class="login-page opportunities-page public-site-page">
    <main class="login-shell">
      <form id="devLoginForm" class="login-panel">
        <div>
          <p class="eyebrow">Internal</p>
          <h1>Owner dashboard</h1>
          <p class="login-note">
            Enter the internal password to view users, campaign usage, and Google API call counts.
          </p>
        </div>
        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">View internal dashboard</button>
        <p id="devLoginError" class="form-error" role="alert"></p>
      </form>
    </main>
    <script src="/dev.js?v=20260509c"></script>
  </body>
</html>
